<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>可视化报告修改 — 白里挑一</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="phone" id="app">

  <div class="status-bar">
    <span class="time">2:57</span>
    <span>6/18 周四</span>
    <span style="color:var(--ok);">📶 🔋 15%</span>
  </div>

  <div class="header">
    <button class="back-btn" id="backBtn">‹</button>
    <span class="title">可视化报告修改</span>
    <span class="badge" id="diseaseBadge">3个</span>
    <button class="btn-generate" id="btnGenerate">生成报告</button>
  </div>

  <div class="patient-bar">
    <span class="name">张*明 · 男 34岁</span>
    <span>病历号 YL20240622</span>
  </div>

  <div class="main-content">

    <div class="photo-area section-card" id="photoWrap">
      <div class="photo-bg" id="photoBg">
        <div id="marker-layer"></div>
        <div class="photo-hint" id="photoHint">👆 点击照片上的牙齿进行标记</div>
      </div>
    </div>

    <div class="status-row">
      <span id="statusText">👆 点击照片上的牙齿进行标记</span>
    </div>

    <div class="disease-bar" id="diseaseBar"></div>
    <div class="thumb-strip" id="thumbStrip"></div>
    <div class="disease-cards section-card" id="diseaseCards" style="margin:4px 12px;"></div>

  </div>

  <div class="action-panel">
    <div class="row">
      <span class="info-text" id="infoText">点击照片标记位置 → 选择牙位 → 选择疾病 → 确认</span>
      <button class="btn-reset" id="btnReset">↺ 重置</button>
    </div>
    <div class="row">
      <select class="form-select" id="selTooth" style="max-width:90px;">
        <option value="">选择牙位</option>
      </select>
      <select class="form-select" id="selDisease"></select>
      <select class="form-select" id="selSeverity"></select>
      <input class="form-input" id="inpNote" placeholder="备注（可选）">
    </div>
    <div class="row">
      <button class="btn-delete" id="btnDelete" style="display:none;">🗑 删除</button>
      <button class="btn-apply" id="btnApply" disabled>请先点击照片标记位置</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
